<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNDER MAINTENANCE - MAT-J MSFS Formation Flight Team</title>
    <!-- Tailwind CSS for utility-first styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for high-quality aviation and system icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Importing premium fonts matching the team's visual identity */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Exo+2:wght@200;400;700;900&family=Noto+Sans+JP:wght@300;400;700&display=swap');

        body {
            font-family: 'Exo 2', 'Noto Sans JP', sans-serif;
            background-color: #0f172a; 
            color: #fff;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Night sky radial gradient matching the original aviation theme */
        .sky-bg {
            background: radial-gradient(circle at center, #1e293b 0%, #090d16 100%);
            position: relative;
        }

        /* Cockpit HUD grid pattern overlays */
        .hud-grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center;
            pointer-events: none;
        }

        /* Screen scanning line simulation for an authentic monitor feel */
        .scanlines {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.25) 50%
            ), linear-gradient(
                90deg, 
                rgba(255, 0, 0, 0.02), 
                rgba(0, 255, 0, 0.01), 
                rgba(0, 0, 255, 0.02)
            );
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
            opacity: 0.4;
        }

        /* Premium Glassmorphism Cards */
        .glass-card {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        /* Cinematic headers */
        .hero-title {
            font-family: 'Cinzel', serif;
            background: linear-gradient(135deg, #ffffff 0%, #a1a1a1 50%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.25));
        }
    </style>
</head>
<body class="sky-bg flex items-center justify-center p-4">

    <!-- Cockpit HUD elements -->
    <div class="hud-grid" style="opacity: 0.3;"></div>

    <!-- Main Container -->
    <div class="w-full max-w-2xl z-10 text-center px-4">
        
        <!-- Header Brand Info -->
        <div class="mb-10 flex flex-col items-center gap-2">
            <div class="flex items-center gap-3">
                <span class="text-4xl font-black italic tracking-tighter text-white drop-shadow-lg">MAT-J</span>
                <span class="text-[10px] font-medium tracking-[0.3em] text-gray-300 uppercase border-l border-white/30 pl-3">MSFS Acrobat Team Japan</span>
            </div>
        </div>

        <!-- Maintenance Notice Glass Card -->
        <div class="glass-card p-8 md:p-14 relative overflow-hidden">
            
            <!-- Warning Icon -->
            <div class="w-20 h-20 mx-auto mb-8 rounded-full flex items-center justify-center border-2 border-amber-500/30 bg-amber-500/10">
                <i class="fas fa-tools text-3xl text-amber-400"></i>
            </div>
            
            <!-- Title -->
            <h1 class="hero-title text-3xl md:text-5xl font-normal mb-10 uppercase tracking-widest">
                System Offline
            </h1>

            <!-- Message Content -->
            <div class="space-y-6">
                <p class="text-base md:text-lg text-gray-200 font-light leading-loose tracking-wider">
                    只今メンテナンス中のため<br class="md:hidden">閲覧できません。<br>
                    ご不便をおかけしております。
                </p>

                <p class="text-base md:text-lg text-gray-200 font-light leading-loose tracking-wider">
                    6/28 中の完成を目指しております。
                </p>
            </div>
        </div>
        
        <!-- Footer Info -->
        <div class="mt-8 text-[9px] text-gray-500 tracking-[0.3em] uppercase">
            © 2024 MSFS Acrobat Team Japan.
        </div>
    </div>

</body>
</html>
